<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appointments — Doctor Portal</title>
  <link rel="stylesheet" href="/css/index.css">
  <link rel="icon" href="/assets/logo.svg" type="image/svg+xml">
</head>
<body>

  <!-- ════════════════ NAVIGATION ════════════════ -->
  <nav class="nav" id="main-nav">
    <div class="nav__logo">
      <img src="/assets/logo.svg" alt="CMS Logo" id="nav-logo">
      <span class="nav__logo-text">CMS</span>
    </div>
    <div class="nav__links">
      <span class="badge badge--secondary">Doctor Portal</span>
    </div>
    <div class="nav__actions" id="nav-actions">
      <!-- Populated by auth.js -->
    </div>
  </nav>

  <!-- ════════════════ DASHBOARD LAYOUT ════════════════ -->
  <div class="dashboard">
    <aside class="sidebar">
      <div style="padding: var(--space-4) 0 var(--space-8);">
        <div style="font-family: var(--font-label); font-size: var(--label-md); color: var(--outline); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: var(--space-4);">Menu</div>
        <a href="/pages/doctor/dashboard.html" class="sidebar__link">📊 Dashboard</a>
        <a href="/pages/doctor/appointments.html" class="sidebar__link active">📅 Appointments</a>
        <a href="/pages/doctor/records.html" class="sidebar__link">📋 Patient Records</a>
        <a href="/pages/doctor/diagnosis.html" class="sidebar__link">🩺 Diagnosis & Rx</a>
        <a href="/pages/doctor/profile.html" class="sidebar__link">👤 Profile & Settings</a>
      </div>
    </aside>

    <main class="main-content">
      <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: var(--space-8);">
        <div>
          <h1 class="section__title" style="margin-bottom: var(--space-2);">Appointments & Availability</h1>
          <p class="section__subtitle">Review your schedule and manage patient workflow statuses.</p>
        </div>
        <div class="input-wrapper" style="max-width: 250px;">
          <input type="date" id="date-filter" class="input-field" placeholder="Select Date" value="">
        </div>
      </div>

      <!-- Schedule Table -->
      <div class="glass-panel animate-on-scroll">
         <div style="overflow-x: auto;">
          <table class="data-table">
            <thead>
              <tr>
                <th>Date & Time</th>
                <th>Patient Name</th>
                <th>Notes</th>
                <th>Current Status</th>
                <th>Update Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="doc-appts-tbody">
              <tr>
                <td colspan="6" style="text-align: center;">Loading data...</td>
              </tr>
            </tbody>
          </table>
         </div>
      </div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/doctor/appointments.js"></script>
</body>
</html>
