<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Registration — CMS</title>
  <meta name="description" content="Register your patient account with the Clinical Management System. Secure, encrypted, and HIPAA compliant.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Patient Registration — CMS">
  <meta property="og:description" content="Create your secure patient profile. Encrypted and HIPAA compliant clinical management.">
  <meta property="og:image" content="/assets/logo.svg">
  <meta property="og:site_name" content="Clinical Management System">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Register — CMS">
  <meta name="twitter:description" content="Create your secure patient profile with the Clinical Management System.">
  <link rel="stylesheet" href="/css/index.css">
  <link rel="icon" href="/assets/logo.svg" type="image/svg+xml">
</head>
<body>

  <!-- ════════════════ NAVIGATION ════════════════ -->
  <nav class="nav" id="main-nav">
    <div class="nav__logo">
      <img src="/assets/logo.svg" alt="CMS Logo" id="nav-logo">
      <span class="nav__logo-text">CMS</span>
    </div>
    <div class="nav__links">
      <a href="/pages/index.html" class="nav__link" id="nav-home">Home</a>
      <a href="/pages/doctors.html" class="nav__link" id="nav-doctors">Doctors Directory</a>
      <a href="/pages/about.html" class="nav__link" id="nav-about">About</a>
      <a href="/pages/about.html#contact" class="nav__link" id="nav-contact">Contact Us</a>
    </div>
    <div class="nav__actions" id="nav-actions">
      <a href="/pages/login.html" class="nav__link" id="nav-login-link">Get Started</a>
      <a href="/pages/register.html" class="btn btn-primary btn-sm" id="nav-register">Register</a>
    </div>
  </nav>

  <!-- ════════════════ REGISTRATION FORM ════════════════ -->
  <main class="auth-page" id="register-page">
    <div class="auth-card" id="register-card" style="max-width: 520px;">
      <div class="auth-card__icon" id="register-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
      </div>
      <h1 class="auth-card__title" id="register-title">Create Account</h1>
      <p class="auth-card__subtitle" id="register-subtitle">Patient registration — secure your clinical profile</p>

      <form id="register-form" autocomplete="on">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4);">
          <div class="input-group">
            <label class="input-label" for="reg-first-name">First Name</label>
            <input type="text" class="input-field" id="reg-first-name" name="firstName" placeholder="Mohammed" required>
          </div>
          <div class="input-group">
            <label class="input-label" for="reg-last-name">Last Name</label>
            <input type="text" class="input-field" id="reg-last-name" name="lastName" placeholder="Ahmed" required>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label" for="reg-email">Email Address</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            <input type="email" class="input-field input-field--icon" id="reg-email" name="email" placeholder="patient@example.com" required autocomplete="email">
          </div>
        </div>

        <div class="input-group">
          <label class="input-label" for="reg-password">Password</label>
          <input type="password" class="input-field" id="reg-password" name="password" placeholder="Min 8 characters" required minlength="8" autocomplete="new-password">
          <div id="password-strength-container" style="margin-top: 8px; display: none;">
            <div style="display: flex; gap: 4px; height: 6px; margin-bottom: 4px;">
              <div id="strength-bar-1" style="flex: 1; background: var(--surface-2); border-radius: 4px; transition: background 0.3s;"></div>
              <div id="strength-bar-2" style="flex: 1; background: var(--surface-2); border-radius: 4px; transition: background 0.3s;"></div>
              <div id="strength-bar-3" style="flex: 1; background: var(--surface-2); border-radius: 4px; transition: background 0.3s;"></div>
              <div id="strength-bar-4" style="flex: 1; background: var(--surface-2); border-radius: 4px; transition: background 0.3s;"></div>
            </div>
            <div id="password-strength-text" style="font-size: 12px; color: var(--text-secondary); text-align: right;"></div>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4);">
          <div class="input-group">
            <label class="input-label" for="reg-dob">Date of Birth</label>
            <input type="date" class="input-field" id="reg-dob" name="dateOfBirth" required style="color-scheme: dark;">
          </div>
          <div class="input-group">
            <label class="input-label" for="reg-gender">Gender</label>
            <select class="input-field" id="reg-gender" name="gender" required>
              <option value="" disabled selected>Select</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label" for="reg-phone">Phone Number <span style="opacity: 0.5;">(optional)</span></label>
          <input type="tel" class="input-field" id="reg-phone" name="phone" placeholder="+20 123 456 7890">
        </div>

        <div class="input-group">
          <label class="input-label" for="reg-address">Address <span style="opacity: 0.5;">(optional)</span></label>
          <input type="text" class="input-field" id="reg-address" name="address" placeholder="123 Main St, Cairo">
        </div>

        <div id="register-error" class="hidden" style="color: var(--error); font-size: var(--body-sm); margin-bottom: var(--space-4); text-align: left;"></div>

        <button type="submit" class="btn btn-primary" id="register-submit">
          <span id="register-btn-text">Create Patient Account</span>
          <div id="register-spinner" class="spinner hidden" style="width: 20px; height: 20px; border-width: 2px;"></div>
        </button>
      </form>

      <div class="auth-card__footer" id="register-footer">
        Already have an account? <a href="/pages/login.html" id="register-to-login">Log in here.</a>
      </div>
    </div>
  </main>

  <!-- ── Scripts ── -->
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    if (Auth.isLoggedIn()) {
      Auth.redirectToDashboard();
    }

    const registerForm = document.getElementById('register-form');
    const registerError = document.getElementById('register-error');
    const registerBtnText = document.getElementById('register-btn-text');
    const registerSpinner = document.getElementById('register-spinner');

    // Password strength logic
    const passwordInput = document.getElementById('reg-password');
    const strengthContainer = document.getElementById('password-strength-container');
    const strengthBars = [
      document.getElementById('strength-bar-1'),
      document.getElementById('strength-bar-2'),
      document.getElementById('strength-bar-3'),
      document.getElementById('strength-bar-4')
    ];
    const strengthText = document.getElementById('password-strength-text');

    passwordInput.addEventListener('input', (e) => {
      const val = e.target.value;
      if (val.length === 0) {
        strengthContainer.style.display = 'none';
        return;
      }
      strengthContainer.style.display = 'block';

      let strength = 0;
      if (val.length >= 8) strength += 1;
      if (/[A-Za-z]/.test(val)) strength += 1;
      if (/[0-9]/.test(val)) strength += 1;
      if (/[^A-Za-z0-9]/.test(val)) strength += 1;

      const colors = ['#ef4444', '#f59e0b', '#10b981', '#3b82f6']; // Hardcoded colors assuming variables might not match perfectly
      const labels = ['Weak - Min 8 chars req', 'Fair - Add numbers', 'Good - Add symbols', 'Strong - Excellent!'];
      
      let mappedIndex = strength - 1;
      if (mappedIndex < 0) mappedIndex = 0;
      
      strengthBars.forEach(b => b.style.background = 'var(--surface-2)');
      
      for (let i = 0; i <= mappedIndex; i++) {
         strengthBars[i].style.background = colors[mappedIndex];
      }
      strengthText.textContent = labels[mappedIndex];
      strengthText.style.color = colors[mappedIndex];
    });

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      registerError.classList.add('hidden');
      registerBtnText.textContent = 'Creating Account...';
      registerSpinner.classList.remove('hidden');

      const payload = {
        first_name: document.getElementById('reg-first-name').value,
        last_name: document.getElementById('reg-last-name').value,
        email: document.getElementById('reg-email').value,
        password: document.getElementById('reg-password').value,
        date_of_birth: document.getElementById('reg-dob').value,
        gender: document.getElementById('reg-gender').value,
        phone: document.getElementById('reg-phone').value || null,
        address: document.getElementById('reg-address').value || null,
      };

      try {
        await api.register(payload);
        Toast.success('Account created! Redirecting to your dashboard...');
        setTimeout(() => Auth.redirectToDashboard(), 1000);
      } catch (err) {
        registerError.textContent = err.detail || 'Registration failed. Please try again.';
        registerError.classList.remove('hidden');
        registerBtnText.textContent = 'Create Patient Account';
        registerSpinner.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
