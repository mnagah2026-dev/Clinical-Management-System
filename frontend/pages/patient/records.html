<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medical Records — Patient Portal</title>
  <link rel="stylesheet" href="/css/index.css">
  <link rel="icon" href="/assets/logo.svg" type="image/svg+xml">
</head>
<body>

  <!-- ════════════════ NAVIGATION ════════════════ -->
  <nav class="nav" id="main-nav">
    <div class="nav__logo">
      <img src="/assets/logo.svg" alt="CMS Logo" id="nav-logo">
      <span class="nav__logo-text">CMS</span>
    </div>
    <div class="nav__links">
      <span class="badge badge--primary">Patient Portal</span>
    </div>
    <div class="nav__actions" id="nav-actions">
      <!-- Populated by auth.js -->
    </div>
  </nav>

  <!-- ════════════════ DASHBOARD LAYOUT ════════════════ -->
  <div class="dashboard">
    <aside class="sidebar">
      <div style="padding: var(--space-4) 0 var(--space-8);">
        <div style="font-family: var(--font-label); font-size: var(--label-md); color: var(--outline); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: var(--space-4);">Menu</div>
        <a href="/pages/patient/dashboard.html" class="sidebar__link">📊 Dashboard</a>
        <a href="/pages/patient/appointments.html" class="sidebar__link">📅 Appointments</a>
        <a href="/pages/patient/records.html" class="sidebar__link active">📋 Medical Records</a>
        <a href="/pages/patient/profile.html" class="sidebar__link">👤 Profile & Settings</a>
      </div>
    </aside>

    <main class="main-content">
      <div style="margin-bottom: var(--space-8);">
        <h1 class="section__title" style="margin-bottom: var(--space-2);">Medical Records</h1>
        <p class="section__subtitle">Review your clinical history, diagnoses, and active prescriptions.</p>
      </div>

      <div class="glass-panel animate-on-scroll">
         <h2 class="card__title" style="margin-bottom: var(--space-6);">History</h2>
         <div id="records-container" style="display: flex; flex-direction: column; gap: var(--space-6);">
            <!-- Populated via JS -->
            <div style="text-align: center; color: var(--on-surface-variant); padding: var(--space-8);">
                <div class="spinner" style="margin: 0 auto;"></div>
            </div>
         </div>
      </div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/patient/records.js"></script>
</body>
</html>
